<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glam My Face by Neethu — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400;1,6..96,500&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@100;200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Jost', sans-serif;
  background: linear-gradient(160deg,
    #1C0A0A 0%,
    #3D1520 20%,
    #6B2A3A 40%,
    #9B4A5A 58%,
    #C4837A 72%,
    #E8BCA8 85%,
    #F5E6D8 100%
  );
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 30%, rgba(212,175,100,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(180,100,100,0.15) 0%, transparent 55%);
  pointer-events: none;
}

.petal {
  position: fixed;
  border-radius: 60% 0 60% 0;
  animation: floatPetal linear infinite;
  pointer-events: none;
  z-index: 1;
}
@keyframes floatPetal {
  0%   { transform: translateY(110vh) rotate(0deg) scale(1);   opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(400deg) scale(0.8); opacity: 0; }
}

.gold-line {
  position: fixed;
  left: 0; right: 0;
  height: 0.5px;
  background: linear-gradient(to right, transparent, rgba(212,175,100,0.3), rgba(212,175,100,0.5), rgba(212,175,100,0.3), transparent);
  pointer-events: none;
  animation: shimmerLine 4s ease-in-out infinite alternate;
}
.gold-line:nth-child(1) { top: 15%; animation-delay: 0s; }
.gold-line:nth-child(2) { top: 85%; animation-delay: 1.5s; }
@keyframes shimmerLine {
  from { opacity: 0.3; }
  to   { opacity: 0.8; }
}

.wrap {
  position: relative;
  z-index: 10;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}

.eyebrow {
  font-family: 'Jost', sans-serif;
  font-weight: 100;
  font-size: 9px;
  letter-spacing: 0.75em;
  text-transform: uppercase;
  color: rgba(245,230,216,0.7);
  opacity: 0;
  animation: fadeUp 0.8s 0.3s forwards;
  margin-bottom: 12px;
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  animation: fadeUp 1s 0.6s forwards;
}



.name {
  font-family: 'Bodoni Moda', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(36px, 7vw, 72px);
  color: #F5E6D8;
  line-height: 1;
  letter-spacing: 0.06em;
  text-shadow: 0 0 80px rgba(212,175,100,0.25), 0 2px 20px rgba(28,10,10,0.4);
}

.name-by {
  font-family: 'Bodoni Moda', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(52px, 10vw, 105px);
  color: #F5E6D8;
  line-height: 1;
  letter-spacing: 0.04em;
  text-shadow: 0 0 80px rgba(212,175,100,0.3), 0 2px 20px rgba(28,10,10,0.4);
  margin-top: 4px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 22px auto 20px;
  opacity: 0;
  animation: fadeUp 0.8s 0.95s forwards;
}
.div-line { width: 55px; height: 0.5px; background: linear-gradient(to right, transparent, rgba(212,175,100,0.7)); }
.div-line.rev { background: linear-gradient(to left, transparent, rgba(212,175,100,0.7)); }
.div-diamond { width: 6px; height: 6px; border: 1px solid rgba(212,175,100,0.8); transform: rotate(45deg); }

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(15px, 2.8vw, 20px);
  color: rgba(245,230,216,0.65);
  letter-spacing: 0.08em;
  opacity: 0;
  animation: fadeUp 0.8s 1.1s forwards;
  margin-bottom: 36px;
}

.coming-wrap {
  opacity: 0;
  animation: fadeUp 0.8s 1.3s forwards;
  margin-bottom: 36px;
}
.coming {
  display: inline-block;
  font-family: 'Jost', sans-serif;
  font-weight: 100;
  font-size: 9.5px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: rgba(245,230,216,0.6);
  border: 0.5px solid rgba(212,175,100,0.35);
  padding: 12px 30px;
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.coming::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,175,100,0.15), transparent);
  animation: sweep 3s ease-in-out infinite;
}
@keyframes sweep {
  0%   { left: -100%; }
  60%  { left: 150%; }
  100% { left: 150%; }
}

.insta {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: rgba(212,175,100,0.75);
  text-decoration: none;
  opacity: 0;
  animation: fadeUp 0.8s 1.5s forwards;
  transition: color 0.3s;
  border-bottom: 0.5px solid rgba(212,175,100,0.25);
  padding-bottom: 4px;
}
.insta:hover { color: rgba(245,230,216,0.9); }

.bottom {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Jost', sans-serif;
  font-weight: 100;
  font-size: 8.5px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(212,175,100,0.35);
  white-space: nowrap;
  opacity: 0;
  animation: fadeUp 0.8s 1.8s forwards;
  z-index: 10;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="gold-line"></div>
<div class="gold-line"></div>

<div class="wrap">
  <div class="eyebrow">Bridal Makeup Artist</div>
  <div class="brand">
    <div class="name">Glam My Face</div>
    <div class="name-by">by Neethu</div>
  </div>
  <div class="divider">
    <div class="div-line rev"></div>
    <div class="div-diamond"></div>
    <div class="div-line"></div>
  </div>
  <div class="tagline">Bridal Makeup · Bridal Hair · Bridal Trials</div>
  <div class="coming-wrap">
    <div class="coming">Something beautiful is coming</div>
  </div>
  <a class="insta" href="https://instagram.com/glam_myface_byneethu" target="_blank">@glam_myface_byneethu</a>
</div>

<div class="bottom">gmfbyneethu.com · Bengaluru, Karnataka</div>

<script>
  const colours = [
    'rgba(212,175,100,0.25)',
    'rgba(232,188,168,0.3)',
    'rgba(180,100,100,0.2)',
    'rgba(245,230,216,0.2)',
    'rgba(155,74,90,0.2)',
  ];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = Math.random() * 22 + 6;
    p.style.cssText = `
      width:${s}px;
      height:${s * 0.65}px;
      left:${Math.random() * 100}%;
      background:${colours[Math.floor(Math.random() * colours.length)]};
      animation-duration:${Math.random() * 14 + 12}s;
      animation-delay:${Math.random() * 10}s;
    `;
    document.body.appendChild(p);
  }
</script>
</body>
</html>
